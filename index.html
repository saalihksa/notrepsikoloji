<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA — 404.html'den gelen yönlendirmeyi işle
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          var h = window.location.search.match(/[?&]h=([^&]+)/);
          window.history.replaceState(null, null,
            path + (h ? decodeURIComponent(h[1]) : '') +
            window.location.search.replace(/[?&]p=[^&]+/, '').replace(/[?&]h=[^&]+/, '').replace(/^[?&]/, '?')
          );
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5A0202" />
    <meta
      name="description"
      content="Notre Psikoloji — bireysel, çift, ergen ve online psikolojik danışmanlık hizmetleri. Randevu alın."
    />
    <title>Notre Psikoloji | Psikolojik Danışmanlık Merkezi</title>

    <link
      rel="preload"
      href="/wp-content/themes/solanum/public/build/frontend/fonts/pp-neue-montreal/500.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
