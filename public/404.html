<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/notrepsikoloji/?p=' + encodeURIComponent(l.pathname.replace('/notrepsikoloji', '') + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      )
    </script>
  </head>
</html>
